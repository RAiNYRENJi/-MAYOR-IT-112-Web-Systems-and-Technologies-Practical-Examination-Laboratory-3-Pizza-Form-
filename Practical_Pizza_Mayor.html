<!DOCTYPE html>
<html>
<head>
<title>Eat It Up! Pizza</title>
</head>
<body>

<h1>Eat it Up! Pizza</h1>

<form>
  <label for="fname">First name:</label><br>
  <input type="text" id="fname" name="fname"><br>
  <label for="lname">Last name:</label><br>
  <input type="text" id="lname" name="lname"><br>
  <label for="address">Addrress:</label><br>
  <input type="text" id="address" name="address"><br>
  <label for="contactno">Contact Details:</label><br>
  <input type="text" id="contactno" name="contactno"><br>
</form>
<br>

<h3>Size of Pizza</h3>

<form>
  <input type="radio" id="small" name="PizzaSize" value="Small">
  <label for="small">Small</label><br>
  <input type="radio" id="medium" name="PizzaSize" value="Medium">
  <label for="medium">Medium</label><br>
  <input type="radio" id="large" name="PizzaSize" value="Large">
  <label for="large">Large</label><br>
  <input type="radio" id="xtralarge" name="PizzaSize" value="XtraLarge">
  <label for="xtralarge">Extra Large</label><br>
</form>
<br>

<h3>Crust Type</h3>

<form>
  <input type="radio" id="Thin" name="CrustType" value="Thin">
  <label for="thin">Thin</label><br>
  <input type="radio" id="Thick" name="CrustType" value="Thick">
  <label for="thick">Thick</label><br>
  <input type="radio" id="Stuffed" name="CrustType" value="Stuffed">
  <label for="Stuffed">Stuffed</label><br>
</form>

<h3>Sauce</h3>

<form>
  <input type="radio" id="Tomato" name="Sauce" value="Tomato">
  <label for="tomato">Tomato Sauce</label><br>
  <input type="radio" id="BBQ" name="Sauce" value="BBQ">
  <label for="bbq">BBQ</label><br>
</form>

<h3>Toppings</h3>

<form>
  <input type="checkbox" id="PizzaTop1" name="Cheese" value="Cheese">
  <label for="PizzaTop1"> Cheese</label><br>
  <input type="checkbox" id="PizzaTop2" name="Pineapple" value="Pineapple">
  <label for="PizzaTop2"> Pineapple</label><br>
  <input type="checkbox" id="PizzaTop3" name="Pepperoni" value="Pepperoni">
  <label for="PizzaTop3"> Pepperonit</label>
</form>
<br>

<h3>Payment Type</h3>

<form>
  <input type="radio" id="CoD" name="Payment" value="Cash on Delivery">
  <label for="cod">Cash on Delivery</label><br>
  <input type="radio" id="Card" name="Payment" value="Card">
  <label for="Card">Credit/Debit Card</label><br>
  <input type="radio" id="MobileWallet" name="Payment" value="MobileWallet">
  <label for="MobileWallet">GCash</label><br>
</form>

<h3>Delivery Method</h3>

<form>
  <input type="radio" id="Xpress" name="Delivery" value="Priority Delivery">
  <label for="xpress">Priority Delivery (additional charges will apply)</label><br>
  <input type="radio" id="Normal" name="Normal" value="Standard Delivery">
  <label for="normal">Standard Delivery</label><br>
</form>
<br>

<button>Place Order</button>

</body>
</html>
